<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Successful</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#f8f5ff,#e6d9ff);
    }

    .success-container{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        width:400px;
        box-shadow:0 10px 30px rgba(138, 43, 226, 0.15);
        animation:fadeIn 1s ease;
    }

    .checkmark{
        width:90px;
        height:90px;
        margin:auto;
        background:#c8a2ff;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        font-size:45px;
        font-weight:bold;
        margin-bottom:20px;
    }

    h1{
        color:#7b2cbf;
        margin-bottom:10px;
    }

    p{
        color:#666;
        margin-bottom:25px;
    }

    .btn{
        display:inline-block;
        text-decoration:none;
        background:#b388ff;
        color:white;
        padding:12px 28px;
        border-radius:30px;
        transition:0.3s;
        font-weight:600;
    }

    .btn:hover{
        background:#9d6cff;
        transform:translateY(-3px);
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }
</style>
</head>

<body>

<div class="success-container">
    <div class="checkmark">✓</div>
    <h1>Login Successful!</h1>
    <p>Welcome back! You have successfully logged into your account.</p>
    <a href="#" class="btn">Continue</a>
</div>

</body>
</html>
